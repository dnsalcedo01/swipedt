<!DOCTYPE html>
<html lang="en" class="min-h-screen">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Home - Swipedt Demo.</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            future: { hoverOnlyWhenSupported: true },
            theme: { extend: {} }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Global Style -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        if(localStorage.getItem('swipedt_demo_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

<!-- Top Navigation Header -->
<header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50 shadow-sm transition-colors duration-300" style="padding-top: env(safe-area-inset-top, 0px);">
    <div class="flex max-w-7xl mx-auto w-full px-4 sm:px-6 items-center justify-between relative h-[56px]">
        
        <div class="flex items-center w-auto z-10 transition-all duration-500">
            <a href="home.html" class="text-xl sm:text-2xl font-black tracking-tight bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 bg-clip-text text-transparent inline-flex items-end">
                Swipedt.
            </a>
        </div>

        <nav class="hidden md:flex items-center justify-center space-x-1 lg:space-x-4 flex-1">
            <a href="home.html" class="relative flex items-center py-2 px-3 text-sm font-semibold transition-all duration-200 text-blue-500 border-b-2 border-blue-500 dark:border-blue-400 dark:text-blue-400">
                <div class="relative inline-block mr-2"><i class="fas fa-home text-lg"></i></div>
                <span>Home</span>
            </a>
            <a href="#" onclick="window.App.alert('Demo', 'Profile views are disabled in the demo.', 'info')" class="relative flex items-center py-2 px-3 text-sm font-semibold transition-all duration-200 text-slate-500 hover:text-blue-500 dark:text-slate-400 dark:hover:text-blue-400 border-b-2 border-transparent">
                <div class="relative inline-block mr-2"><i class="fas fa-user text-lg"></i></div>
                <span>Profile</span>
            </a>
            <a href="#" onclick="window.App.alert('Demo', 'Notifications are disabled in the demo.', 'info')" class="relative flex items-center py-2 px-3 text-sm font-semibold transition-all duration-200 text-slate-500 hover:text-blue-500 dark:text-slate-400 dark:hover:text-blue-400 border-b-2 border-transparent">
                <div class="relative inline-block mr-2"><i class="fas fa-bell text-lg"></i></div>
                <span>Notifications</span>
            </a>
        </nav>

        <div class="flex items-center space-x-1 sm:space-x-3 z-10">
            <button id="theme-toggle" class="p-2 text-slate-500 hover:text-blue-500 dark:text-slate-400 dark:hover:text-blue-400 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition" title="Toggle Theme">
                <i class="fas fa-moon text-lg"></i>
            </button>
            <a href="#" onclick="localStorage.removeItem('swipedt_demo_logged_in'); window.location.href='login.html';" class="p-2 text-slate-500 hover:text-red-500 dark:text-slate-400 dark:hover:text-red-400 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition" title="Logout">
                <i class="fas fa-sign-out-alt text-lg"></i>
            </a>
        </div>
    </div>
</header>

<!-- Bottom Navigation Bar for Mobile -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex justify-around items-center z-50 shadow-lg px-2" style="padding-bottom: env(safe-area-inset-bottom, 0px); min-height: calc(56px + env(safe-area-inset-bottom, 0px));">
    <a href="home.html" class="relative flex flex-col items-center justify-center w-16 h-full transition-all duration-200 text-blue-500 dark:text-blue-400">
        <div class="relative inline-block"><i class="fas fa-home text-lg"></i></div>
        <span class="text-[10px] mt-0.5 font-medium">Home</span>
    </a>
    <a href="#" onclick="window.App.alert('Demo', 'Profile views are disabled in the demo.', 'info')" class="relative flex flex-col items-center justify-center w-16 h-full transition-all duration-200 text-slate-400 dark:text-slate-500">
        <div class="relative inline-block"><i class="fas fa-user text-lg"></i></div>
        <span class="text-[10px] mt-0.5 font-medium">Profile</span>
    </a>
    <button type="button" onclick="window.App.alert('Demo', 'Posting is disabled in the demo.', 'info')" class="relative flex flex-col items-center justify-center w-16 h-full transition-all duration-200 focus:outline-none group text-slate-400 dark:text-slate-500 hover:text-slate-500 dark:hover:text-slate-400">
        <div class="relative flex items-center justify-center w-8 h-6 border-2 border-dotted border-slate-400 dark:border-slate-500 rounded-lg group-hover:bg-slate-100 dark:group-hover:bg-slate-800 transition mb-1">
            <i class="fas fa-plus text-[12px]"></i>
        </div>
        <span class="text-[10px] font-medium leading-none">Post</span>
    </button>
    <a href="#" onclick="window.App.alert('Demo', 'Notifications are disabled in the demo.', 'info')" class="relative flex flex-col items-center justify-center w-16 h-full transition-all duration-200 text-slate-400 dark:text-slate-500">
        <div class="relative inline-block"><i class="fas fa-bell text-lg"></i></div>
        <span class="text-[10px] mt-0.5 font-medium">Notifications</span>
    </a>
    <a href="#" class="relative flex flex-col items-center justify-center w-16 h-full transition-all duration-200 text-slate-400 dark:text-slate-500">
        <div class="relative inline-block"><i class="fas fa-bars text-lg"></i></div>
        <span class="text-[10px] mt-0.5 font-medium">Menu</span>
    </a>
</nav>

<main class="flex-1 max-w-lg md:max-w-xl mx-auto w-full px-4 pt-3 pb-20 md:pb-6 flex flex-col relative">
    <!-- Feed Switcher Tabs -->
    <div id="feed-tabs-container" class="flex justify-center space-x-6 mb-3 mt-2 md:mt-3 relative z-40">
        <button id="tab-suggested" class="feed-tab text-base font-bold pb-2 border-b-2 border-blue-500 text-slate-800 dark:text-slate-100 transition-colors" onclick="window.switchFeed('suggested')">Suggested</button>
        <button id="tab-following" class="feed-tab text-base font-semibold pb-2 border-b-2 border-transparent text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors" onclick="window.switchFeed('following')">Following</button>
    </div>

    <!-- Swipe Feed Area Wrapper -->
    <div class="relative w-full flex-1 flex flex-col">
        <!-- Desktop Swipe Overlays -->
        <div id="desktop-swipe-left" class="hidden lg:block absolute inset-y-0 -left-32 w-32 group cursor-pointer z-10" onclick="if(typeof forceSwipe === 'function') forceSwipe('left')">
            <div class="absolute top-1/2 -translate-y-1/2 w-full flex justify-center items-center opacity-0 group-hover:opacity-100 transition-all duration-300 transform group-hover:-translate-x-1 text-base font-black tracking-tight drop-shadow-sm">
                <i class="fas fa-chevron-left mr-1 text-cyan-500"></i>
                <span class="bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 bg-clip-text text-transparent uppercase">Swipe</span>
            </div>
        </div>
        <div id="desktop-swipe-right" class="hidden lg:block absolute inset-y-0 -right-32 w-32 group cursor-pointer z-10" onclick="if(typeof forceSwipe === 'function') forceSwipe('right')">
            <div class="absolute top-1/2 -translate-y-1/2 w-full flex justify-center items-center opacity-0 group-hover:opacity-100 transition-all duration-300 transform group-hover:translate-x-1 text-base font-black tracking-tight drop-shadow-sm">
                <span class="bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 bg-clip-text text-transparent uppercase">Swipe</span>
                <i class="fas fa-chevron-right ml-1 text-purple-500"></i>
            </div>
        </div>

        <!-- Swipe Feed Area -->
        <div class="flex-1 relative flex items-start justify-center pt-2 md:pt-4 w-full" id="feed-container" style="min-height: calc(100vh - 11rem);">
            <!-- Loading Indicator -->
            <div id="loading-indicator" class="hidden absolute flex flex-col items-center space-y-2">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                <span class="text-sm text-slate-400">Loading...</span>
            </div>
            
            <!-- End of Feed State -->
            <div id="no-posts-message" class="hidden absolute text-center bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-lg max-w-sm">
                <i class="fas fa-smile-wink text-5xl text-blue-500 mb-4"></i>
                <h3 class="text-xl font-extrabold mb-2">You're All Caught Up!</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">You have swiped through all demo posts.</p>
                <button class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl transition shadow" onclick="location.reload()">Restart Demo</button>
            </div>
        </div>
    </div>
</main>

<script src="js/demo-dialogs.js"></script>
<script src="js/demo-feed.js"></script>

</body>
</html>
