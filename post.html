<!DOCTYPE html>
<html lang="en" class="min-h-screen">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Post - Swipedt Demo.</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            future: { hoverOnlyWhenSupported: true },
            theme: { extend: {} }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Global Style -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script>
        if(localStorage.getItem('swipedt_demo_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

<!-- Top Navigation Header -->
<header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50 shadow-sm transition-colors duration-300" style="padding-top: env(safe-area-inset-top, 0px);">
    <div class="flex max-w-7xl mx-auto w-full px-4 sm:px-6 items-center justify-between relative h-[56px]">
        
        <div class="flex items-center w-auto z-10 transition-all duration-500 space-x-2">
            <a href="home.html" class="p-2 -ml-2 text-slate-500 hover:text-blue-500 dark:text-slate-400 dark:hover:text-blue-400 transition rounded-full hover:bg-slate-100 dark:hover:bg-slate-700">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <a href="home.html" class="text-xl sm:text-2xl font-black tracking-tight bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 bg-clip-text text-transparent inline-flex items-end">
                Swipedt.
            </a>
        </div>

        <nav class="hidden md:flex items-center justify-center space-x-1 lg:space-x-4 flex-1">
            <a href="home.html" class="relative flex items-center py-2 px-3 text-sm font-semibold transition-all duration-200 text-slate-500 hover:text-blue-500 dark:text-slate-400 dark:hover:text-blue-400 border-b-2 border-transparent">
                <div class="relative inline-block mr-2"><i class="fas fa-home text-lg"></i></div>
                <span>Home</span>
            </a>
        </nav>

        <div class="flex items-center space-x-1 sm:space-x-3 z-10">
            <button id="theme-toggle" class="p-2 text-slate-500 hover:text-blue-500 dark:text-slate-400 dark:hover:text-blue-400 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition" title="Toggle Theme">
                <i class="fas fa-moon text-lg"></i>
            </button>
        </div>
    </div>
</header>

<main class="flex-1 max-w-lg md:max-w-xl mx-auto w-full px-4 pt-4 pb-20 md:pb-6 flex flex-col relative">
    
    <!-- Single Post Area -->
    <div id="single-post-container" class="w-full">
        <!-- Post card injected here by demo-feed.js -->
    </div>

    <!-- Comments Section -->
    <div class="w-full bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 mt-4">
        <h3 class="font-bold text-lg mb-4 text-slate-800 dark:text-slate-100 border-b border-slate-100 dark:border-slate-700 pb-2">Comments</h3>
        
        <form onsubmit="window.postComment(event)" class="flex space-x-2 mb-6">
            <img src="https://ui-avatars.com/api/?name=Demo+User&background=3b82f6&color=fff" class="w-10 h-10 rounded-full shrink-0 shadow" alt="Your Avatar">
            <input type="text" id="comment-input" placeholder="Write a comment..." class="flex-1 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-full px-4 py-2 text-sm text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <button type="submit" class="w-10 h-10 shrink-0 bg-blue-500 hover:bg-blue-600 text-white rounded-full flex items-center justify-center transition shadow">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>

        <div id="comments-list">
            <!-- Mock comments injected here -->
        </div>
    </div>
</main>

<script src="js/demo-feed.js"></script>

</body>
</html>
